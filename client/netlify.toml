[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/auth/*"
  to = "https://kh-attendance.onrender.com/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://kh-attendance.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://kh-attendance.onrender.com/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
